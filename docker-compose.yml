services:
 postgres:
  image: postgres:16
  container_name: todo_postgres
  restart: always
  environment:
    POSTGRES_DB: todo_db
    POSTGRES_USER: renchin
    POSTGRES_PASSWORD: 1234
  ports: 
    - "5432:5432"
  volumes: 
    - todo_postgres_data:/var/lib/postgresql/data
volumes:
  todo_postgres_data: